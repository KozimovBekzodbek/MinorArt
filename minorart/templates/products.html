{% extends 'base.html' %}
{% load static %}
{% block content %}






    
    <!-- products-content will be here -->
    <div id="products-page-content">
        <div class="container">
            <div class="row">
                <!-- 1 -->
                {% for item in product %}
                <div class="col-12 col-md-6 col-lg-4 col-xl-3">
                    <div class="card">
                        <div class="img-box">
                            <img class="card-img-top" src="{{item.main_image.url}}" alt="minor art industry pharmaceutical | Bibikon">
                        </div>
                        <div class="card-body">
                            <div class="text">
                                <h3>{{item.name}}</h3>
                                <p>{{item.description}}</p>
                            </div>
                            <a href="{% url 'common:product-detail' item.slug  %}">Batafsil</a>
                        </div>
                    </div>
                </div>
                {% endfor %}

            </div>
        </div>
    </div>









{% endblock %}
